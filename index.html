<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
background:#f8fafc;
color:#0f172a;
}

.hero{
padding:30px 20px 5px;
}

.hero-logo{
width:1100px;
max-width:95%;
margin:0 auto;
display:block;
filter:drop-shadow(0 16px 32px rgba(0,0,0,.25));
}

.section{
max-width:1120px;
margin:0 auto;
padding:0 22px;
}

.section-title{
font-size:42px;
font-weight:900;
color:#ff3131;
margin:32px 0 18px;
letter-spacing:1px;
}

.card-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin:0 auto 32px;
}

.center-cards{
display:flex;
justify-content:center;
gap:18px;
margin:0 auto 32px;
flex-wrap:wrap;
}

.center-cards .card{
width:240px;
}

.card{
background:white;
border:none;
border-radius:22px;
padding:28px 14px 22px;
cursor:pointer;
box-shadow:0 8px 22px rgba(0,0,0,.18);
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 14px 30px rgba(0,0,0,.24);
}

.icon{
font-size:58px;
margin-bottom:14px;
}

.card-title{
font-size:21px;
font-weight:900;
color:#000;
line-height:1.15;
}

.oil{color:#16a34a;}
.gas{color:#f59e0b;}
.water{color:#2563eb;}
.rig{color:#dc2626;}
.swdmap{color:#0f766e;}
.deep{color:#2563eb;}
.shallow{color:#16a34a;}
.seismic{color:#dc2626;}
.time{color:#f97316;}
.depth{color:#2563eb;}
.gis{color:#0f766e;}
.forecast{color:#3b82f6;}
.risk{color:#e11d48;}
.video{color:#dc2626;}
.report{color:#7c3aed;}

.modal{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.88);
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

.modal-content{
max-width:95%;
max-height:90vh;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,.55);
background:white;
}

.close-modal{
position:absolute;
top:18px;
right:32px;
font-size:52px;
font-weight:bold;
color:white;
cursor:pointer;
z-index:10000;
}

.footer{
margin-top:28px;
padding:26px 20px;
background:#e5e7eb;
display:flex;
justify-content:center;
gap:38px;
flex-wrap:wrap;
}

.footer a{
font-size:22px;
font-weight:900;
color:#000;
text-decoration:none;
}

.footer i{
display:block;
font-size:42px;
color:#1e88ff;
margin-bottom:8px;
}

.copy{
padding:24px;
font-size:18px;
font-weight:900;
color:#0f172a;
background:white;
}

@media(max-width:900px){
.card-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:560px){
.section-title{
font-size:34px;
}

.card-grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.center-cards{
gap:12px;
}

.center-cards .card{
width:43%;
}

.card{
padding:22px 8px 18px;
}

.card-title{
font-size:18px;
}

.icon{
font-size:48px;
}

.footer{
gap:24px;
}

.footer a{
font-size:18px;
}
}
</style>
</head>

<body>

<div class="hero">
<img src="image.png" alt="PermianAgentic Logo" class="hero-logo">
</div>

<div class="section">

<h1 class="section-title">Production Data</h1>

<div class="card-grid">
<button class="card" onclick="showImage('oil')">
<i class="fa-solid fa-oil-well icon oil"></i>
<div class="card-title">Oil Production</div>
</button>

<button class="card" onclick="showImage('gas')">
<i class="fa-solid fa-fire-flame-curved icon gas"></i>
<div class="card-title">Gas Production</div>
</button>

<button class="card" onclick="showImage('water')">
<i class="fa-solid fa-droplet icon water"></i>
<div class="card-title">Water Production</div>
</button>

<button class="card" onclick="showImage('rig')">
<i class="fa-solid fa-industry icon rig"></i>
<div class="card-title">Rig Count</div>
</button>
</div>

<h1 class="section-title">SWD Injection Data</h1>

<div class="center-cards">
<button class="card" onclick="showImage('swd-map')">
<i class="fa-solid fa-map-location-dot icon swdmap"></i>
<div class="card-title">SWD Injection Map</div>
</button>

<button class="card" onclick="showImage('deep')">
<i class="fa-solid fa-arrow-down-long icon deep"></i>
<div class="card-title">Deep Injection</div>
</button>

<button class="card" onclick="showImage('shallow')">
<i class="fa-solid fa-arrow-up-long icon shallow"></i>
<div class="card-title">Shallow Injection</div>
</button>
</div>

<h1 class="section-title">Induced Seismicity Data</h1>

<div class="center-cards">
<button class="card" onclick="showImage('seismic')">
<i class="fa-solid fa-earth-americas icon seismic"></i>
<div class="card-title">Seismicity Map</div>
</button>

<button class="card" onclick="showImage('seismicity-time')">
<i class="fa-solid fa-chart-line icon time"></i>
<div class="card-title">Seismicity-Time</div>
</button>

<button class="card" onclick="showImage('seismicity-depth')">
<i class="fa-solid fa-layer-group icon depth"></i>
<div class="card-title">Seismicity-Depth</div>
</button>
</div>

<h1 class="section-title">Agentic AI SWD Control Data</h1>

<div class="center-cards">
<button class="card" onclick="showImage('basin-gis')">
<i class="fa-solid fa-map icon gis"></i>
<div class="card-title">Basin GIS Data</div>
</button>

<button class="card" onclick="showImage('forecast')">
<i class="fa-solid fa-wave-square icon forecast"></i>
<div class="card-title">Seismicity Forecast</div>
</button>

<button class="card" onclick="showImage('bvalue')">
<i class="fa-solid fa-bullseye icon risk"></i>
<div class="card-title">B-Value Risk Map</div>
</button>
</div>

<h1 class="section-title">Agentic AI SWD Autonomous Control Video</h1>

<div class="center-cards">
<button class="card" onclick="showImage('autonomous-video')">
<i class="fa-solid fa-circle-play icon video"></i>
<div class="card-title">Autonomous Control Video</div>
</button>
</div>

<h1 class="section-title">Our Reports For Industry</h1>

<div class="card-grid">
<button class="card" onclick="showImage('well-decline-report')">
<i class="fa-solid fa-chart-area icon report"></i>
<div class="card-title">Well Decline Report</div>
</button>

<button class="card" onclick="showImage('production-forecast-report')">
<i class="fa-solid fa-chart-line icon report"></i>
<div class="card-title">Production Forecast Report</div>
</button>

<button class="card" onclick="showImage('lease-report')">
<i class="fa-solid fa-file-waveform icon report"></i>
<div class="card-title">Lease Area Seismic Risk Report</div>
</button>

<button class="card" onclick="showImage('optimization-report')">
<i class="fa-solid fa-file-contract icon report"></i>
<div class="card-title">SWD Injection Optimization Report</div>
</button>
</div>

</div>

<div class="footer">
<a href="method.html"><i class="fa-solid fa-book"></i>Method</a>
<a href="about.html"><i class="fa-solid fa-users"></i>About Us</a>
<a href="contact.html"><i class="fa-solid fa-envelope"></i>Contact</a>
</div>

<div class="copy">
© 2026 All Rights Reserved.
</div>

<div id="imageModal" class="modal">
<span class="close-modal" onclick="closeModal()">&times;</span>
<img id="modalImage" class="modal-content" alt="Popup Image">
</div>

<script>
const imgMap={
'oil':'oil.png',
'gas':'gas.png',
'water':'water.png',
'rig':'rig.png',
'swd-map':'swd-injection-map.png',
'deep':'deep-injection.png',
'shallow':'shallow-injection.png',
'seismic':'seismic-map.png',
'seismicity-time':'seismicity-time.png',
'seismicity-depth':'seismicity-depth.png',
'basin-gis':'basin-gis-data.png',
'forecast':'seismicity-forecast.png',
'bvalue':'bvalue-risk.png',
'autonomous-video':'agentic-ai-swd-autonomous-control-video.png',
'well-decline-report':'well-decline-report.png',
'production-forecast-report':'production-forecast-report.png',
'lease-report':'lease-area-seismic-risk-report.png',
'optimization-report':'swd-injection-optimization-report.png'
};

function showImage(id){
document.getElementById('modalImage').src=imgMap[id];
document.getElementById('imageModal').style.display='flex';
}

function closeModal(){
document.getElementById('imageModal').style.display='none';
document.getElementById('modalImage').src='';
}

window.onclick=function(event){
const modal=document.getElementById('imageModal');
if(event.target===modal){
closeModal();
}
}

document.addEventListener('keydown',function(event){
if(event.key==='Escape'){
closeModal();
}
});
</script>

</body>
</html>
